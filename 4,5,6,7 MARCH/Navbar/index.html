<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      nav {
        background-color: bisque;
        padding: 15px 30px;
      }
      nav ul {
        display: flex;
        justify-content: space-around;
        list-style: none;
      }
      nav ul li a {
        text-decoration: none;
        color: black;
        font-size: large;
      }
      @media (max-width: 768px) {
        nav ul {
          flex-direction: column;
          align-items: center;
          gap: 15px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Home</a></li>
        </ul>
      </nav>
    </header>
  </body>
</html>
